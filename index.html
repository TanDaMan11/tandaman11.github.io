<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tanner’s Games</title>

  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9247546865038453"
     crossorigin="anonymous"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
    }

    header {
      padding: 40px 20px;
      text-align: center;
      background: #111827;
    }

    header h1 {
      margin: 0;
      font-size: 40px;
    }

    header p {
      color: #94a3b8;
      margin-top: 10px;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      padding: 30px;
      max-width: 900px;
      margin: auto;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 16px;
      text-align: center;
      text-decoration: none;
      color: white;
      transition: 0.2s;
    }

    .card:hover {
      transform: scale(1.05);
      background: #334155;
    }

    .icon {
      font-size: 40px;
      margin-bottom: 10px;
    }

    .title {
      font-size: 20px;
      margin: 0;
    }

    footer {
      text-align: center;
      padding: 20px;
      color: #64748b;
      font-size: 12px;
    }
  </style>
</head>

<body>

  <header>
    <h1>Tanner’s Games</h1>
    <p>Simple browser games built by Tanner</p>
  </header>

  <div class="container">

    <a class="card" href="/-/swarm.html">
      <div class="icon">🐝</div>
      <div class="title">Swarm</div>
    </a>

    <a class="card" href="/-/simulator.html">
      <div class="icon">🧪</div>
      <div class="title">Simulator</div>
    </a>

    <a class="card" href="/-/1v1.html">
      <div class="icon">⚔️</div>
      <div class="title">1v1 Fight</div>
    </a>

  </div>

  <footer>
    © Tanner’s Games
  </footer>

</body>
</html>
